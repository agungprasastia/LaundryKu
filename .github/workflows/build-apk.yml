name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPO_PUBLIC_API_URL: https://laundryku-api-production-4666.up.railway.app
      EXPO_PUBLIC_USE_DUMMY_PAYMENT: true
      EXPO_PUBLIC_ALLOW_MANUAL_COORDS: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Install dependencies
        run: npm ci

      - name: Generate Native Android Folder (Prebuild)
        run: npx expo prebuild --platform android --clean

      - name: Build APK (AssembleRelease)
        working-directory: ./android
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: ./gradlew assembleRelease

      - name: Get current date
        id: date
        run: |
          echo "date_tag=$(date +'%v%Y%m%d%H%M')" >> $GITHUB_ENV
          echo "date_name=$(date +'%d %B %Y - %H:%M')" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.date_tag }}
          name: "LaundryKu APK - ${{ env.date_name }}"
          files: ./android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

