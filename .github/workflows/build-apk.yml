name: Build APK (Expo EAS Cloud)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK via EAS
        run: eas build --platform android --profile preview --non-interactive --no-wait

      - name: Build Link
        run: echo "Build dikirim ke EAS! Pantau progress di https://expo.dev/accounts/me/projects/LaundryKu/builds"

